openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contact
    description: Contact form submissions
  - name: sitecart
    description: SITECART early-access lead submissions
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /contact:
    post:
      operationId: submitContactForm
      tags: [contact]
      summary: Submit a contact form inquiry
      description: |
        Validates a contact form submission, logs the inquiry, and forwards
        it via transactional email to the configured recipient for the
        provided source.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactFormRequest"
      responses:
        "200":
          description: Submission accepted (and queued for delivery)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormError"
        "500":
          description: Email delivery failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormError"
        "503":
          description: Email service is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormError"
  /sitecart-leads:
    post:
      operationId: submitSitecartLead
      tags: [sitecart]
      summary: Register interest in SITECART
      description: |
        Validates a SITECART early-access registration, persists it to the
        shared `contact_submissions` store, and forwards a notification
        email to the SITECART team via the same transactional email
        pipeline used by the contact form.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SitecartLeadRequest"
      responses:
        "200":
          description: |
            Lead accepted (and queued for delivery), or recognised as a
            duplicate of a recent submission from the same email and
            silently de-duplicated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitecartLeadResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormError"
        "429":
          description: Too many submissions from this client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormError"
        "500":
          description: Email delivery failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormError"
        "503":
          description: Email service or database is not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormError"
    get:
      operationId: listSitecartLeads
      tags: [sitecart]
      summary: List SITECART early-access leads (admin only)
      description: |
        Returns SITECART early-access leads, most recent first. Requires a
        bearer token matching one of the admin secrets (`EXPORT_API_KEY`,
        `ANALYTICS_PASSWORD`) or the SITECART owner secret
        (`INBOX_PASSWORD_SITECART`). The structured fields (business,
        trade, location, model, use case) are parsed back out of the
        notification message body so the SITECART team can browse leads
        without querying the database directly.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: search
          required: false
          schema:
            type: string
            maxLength: 200
          description: |
            Case-insensitive substring match against business name (taken
            from the notification subject) and email address.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 200
        - in: query
          name: salesStage
          required: false
          schema:
            $ref: "#/components/schemas/SitecartLeadSalesStage"
          description: |
            Optional sales-pipeline stage filter. When omitted, leads in
            every stage are returned.
      responses:
        "200":
          description: Leads list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitecartLeadList"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormError"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormError"
  /sitecart-leads/{id}:
    patch:
      operationId: updateSitecartLead
      tags: [sitecart]
      summary: Update sales stage / internal note for a SITECART lead (admin only)
      description: |
        Lets the SITECART team move a lead through the sales pipeline by
        updating its `salesStage` and/or attach a private `note`. Reuses
        the same bearer-token auth as the listing endpoint. The sales
        stage and note live on the existing `contact_submissions` row;
        the email-delivery `status` column is left untouched.

        Both `salesStage` and `note` are optional in the request body —
        omitting a field leaves the stored value alone, so a "just save
        the note" call won't reset the stage. Pass `note: null` (or an
        empty string) to clear an existing note.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SitecartLeadUpdateRequest"
      responses:
        "200":
          description: Updated lead row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitecartLeadUpdateResponse"
        "400":
          description: Invalid request body or path parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormError"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormError"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ContactFormRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        email:
          type: string
          format: email
          maxLength: 254
        subject:
          type: string
          minLength: 1
          maxLength: 200
        message:
          type: string
          minLength: 5
          maxLength: 5000
        source:
          type: string
          description: Identifier for the site that submitted the form
          enum:
            - bookies-beats
            - wld-branding
        company:
          type: string
          description: Honeypot field — must be left empty by real users
      required:
        - name
        - email
        - subject
        - message
        - source
    SitecartLeadRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        business:
          type: string
          minLength: 1
          maxLength: 200
          description: Business or company name
        trade:
          type: string
          minLength: 1
          maxLength: 120
          description: Trade or profession (e.g. carpenter, electrician)
        location:
          type: string
          minLength: 1
          maxLength: 200
          description: Site location, typically suburb / state
        phone:
          type: string
          minLength: 4
          maxLength: 40
        email:
          type: string
          format: email
          maxLength: 254
        useCase:
          type: string
          maxLength: 2000
          description: Free-text description of how the customer would use SITECART
        interestedModel:
          type: string
          enum:
            - Core
            - Pro
            - Custom
        company:
          type: string
          description: Honeypot field — must be left empty by real users
      required:
        - name
        - business
        - trade
        - location
        - phone
        - email
        - interestedModel
    ContactFormResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    SitecartLeadSalesStage:
      type: string
      description: |
        Sales-pipeline stage for a SITECART lead. Distinct from the
        email-delivery `status` field — the team uses this to record
        what's actually happened with the lead: "new" (untouched),
        "contacted" (we've reached out), "qualified" (a real fit /
        won), or "not_a_fit" (closed without a sale).
      enum:
        - new
        - contacted
        - qualified
        - not_a_fit
    SitecartLead:
      type: object
      description: |
        A single SITECART early-access lead. Structured fields are parsed
        back out of the notification message body that the POST handler
        wrote at submission time.
      properties:
        id:
          type: integer
        createdAt:
          type: string
          format: date-time
        name:
          type: string
        email:
          type: string
        business:
          type: string
        trade:
          type: string
        location:
          type: string
        phone:
          type: string
        interestedModel:
          type: string
          description: One of "Core", "Pro", "Custom" (or any future model).
        useCase:
          type: string
          nullable: true
        status:
          type: string
          description: Email delivery status — "sent", "pending", or "failed".
        sentAt:
          type: string
          format: date-time
          nullable: true
        attempts:
          type: integer
        errorReason:
          type: string
          nullable: true
        salesStage:
          $ref: "#/components/schemas/SitecartLeadSalesStage"
        internalNote:
          type: string
          nullable: true
          description: |
            Free-text note attached to the lead by the SITECART team
            (e.g. "called Tuesday, will follow up Friday"). Up to 2000
            characters; null when no note has been recorded.
        salesStageUpdatedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp of the most recent *actual* change to
            `salesStage` (a no-op re-click does not bump it). Null
            for legacy rows that have never been touched since the
            audit columns were added, or for rows still on the
            default "new" stage.
        salesStageUpdatedBy:
          type: string
          nullable: true
          enum:
            - inbox
            - analytics
            - export
          description: |
            Identity label of the bearer secret that performed the
            most recent stage change. Not a per-user identity — the
            SITECART admin password is shared, so the most we can
            honestly attribute a change to is *which secret* was used:
            "inbox" (INBOX_PASSWORD_SITECART, the SITECART team
            password), "analytics" (ANALYTICS_PASSWORD, internal
            staff), or "export" (EXPORT_API_KEY, machine-to-machine).
            Null for legacy rows or rows still on the default stage.
      required:
        - id
        - createdAt
        - name
        - email
        - business
        - trade
        - location
        - phone
        - interestedModel
        - status
        - attempts
        - salesStage
    SitecartLeadUpdateRequest:
      type: object
      description: |
        Partial update — both fields are optional. Omit a field to
        leave its stored value alone. Pass `note: null` (or an empty
        string) to clear an existing note.
      properties:
        salesStage:
          $ref: "#/components/schemas/SitecartLeadSalesStage"
        note:
          type: string
          nullable: true
          maxLength: 2000
    SitecartLeadUpdateResponse:
      type: object
      properties:
        ok:
          type: boolean
        lead:
          $ref: "#/components/schemas/SitecartLead"
      required:
        - ok
        - lead
    SitecartLeadList:
      type: object
      properties:
        count:
          type: integer
        leads:
          type: array
          items:
            $ref: "#/components/schemas/SitecartLead"
      required:
        - count
        - leads
    SitecartLeadResponse:
      type: object
      properties:
        ok:
          type: boolean
        duplicate:
          type: boolean
          description: |
            True when the server recognised this submission as a
            duplicate of a recent (within 24h) registration from the
            same email address and skipped both the database insert and
            the notification email. Clients can use this to soften the
            success copy shown to the user.
      required:
        - ok
    ContactFormError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
